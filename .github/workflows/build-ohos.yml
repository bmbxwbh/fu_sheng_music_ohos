name: Build HarmonyOS HAP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (ohos)
        run: |
          git clone -b br_3.27.4-ohos-1.0.4 "https://gitcode.com/openharmony-tpc/flutter_flutter.git" "$HOME/flutter-ohos"
          echo "$HOME/flutter-ohos/bin" >> $GITHUB_PATH
          export PATH="$HOME/flutter-ohos/bin:$PATH"
          flutter config --enable-ohos
          flutter --version

      - name: Setup OpenHarmony SDK
        run: |
          echo "Downloading OpenHarmony SDK (2.5GB)..."
          curl -fsSL --retry 3 "https://mirrors.huaweicloud.com/harmonyos/os/6.1-Release/ohos-sdk-windows_linux-public.tar.gz" -o /tmp/ohos-sdk.tar.gz
          mkdir -p $HOME/ohos-sdk
          tar xzf /tmp/ohos-sdk.tar.gz -C $HOME/ohos-sdk/
          rm /tmp/ohos-sdk.tar.gz
          cd $HOME/ohos-sdk/linux
          for z in *.zip; do unzip -qo "$z" -d . 2>/dev/null || true; done
          rm -f *.zip
          cd $GITHUB_WORKSPACE
          # 查找 hdc
          HDC_PATH=$(find $HOME/ohos-sdk -name "hdc" -type f 2>/dev/null | head -1)
          echo "hdc: $HDC_PATH"
          TOOLCHAINS_SRC=$(dirname "$HDC_PATH")
          echo "toolchains src: $TOOLCHAINS_SRC"
          # 创建 API 版本目录结构
          mkdir -p $HOME/ohos-sdk/linux/12/toolchains
          cp -r "$TOOLCHAINS_SRC"/* $HOME/ohos-sdk/linux/12/toolchains/
          # 创建 sdk-pkg.json（HmosSdk 需要这个文件来识别 API 版本）
          mkdir -p $HOME/ohos-sdk/linux/12
          cat > $HOME/ohos-sdk/linux/12/sdk-pkg.json << 'EOF'
          {"data":{"apiVersion":"12"}}
          EOF
          echo "=== 目录结构 ==="
          ls -la $HOME/ohos-sdk/linux/
          echo "=== 12/toolchains/hdc 验证 ==="
          ls -la $HOME/ohos-sdk/linux/12/toolchains/hdc
          # build_hap.dart 检查 globals.hmosSdk，通过 HmosSdk 查找 HOS_SDK_HOME
          export HOS_SDK_HOME="$HOME/ohos-sdk/linux"
          echo "HOS_SDK_HOME=$HOS_SDK_HOME" >> $GITHUB_ENV

      - name: Download signing tools
        run: |
          curl -fsSL "https://mirrors.huaweicloud.com/harmonyos/develop_tools/hapsigntoolv2.jar" -o hapsigntoolv2.jar
          curl -fsSL "https://mirrors.huaweicloud.com/harmonyos/develop_tools/hmos_app_packing_tool.jar" -o hmos_app_packing_tool.jar
          echo "✅ 签名工具下载完成"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/
            ~/.pub-cache/
          key: ${{ runner.os }}-ohos-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-ohos-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Create Ohos platform
        run: |
          echo "=== 生成 ohos 平台目录 ==="
          flutter create --platforms ohos --org com.fusheng --project-name fu_sheng_music_ohos .
          echo "=== ohos 目录结构 ==="
          ls -la ohos/
          ls -la ohos/entry/ 2>/dev/null || echo "⚠️ entry 目录不存在"

      - name: Build HAP
        run: |
          echo "=== SDK 检测调试 ==="
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          ls -la "$HOS_SDK_HOME/"
          ls -la "$HOS_SDK_HOME/12/"
          echo "=== sdk-pkg.json ==="
          cat "$HOS_SDK_HOME/12/sdk-pkg.json"
          echo "=== 开始构建 ==="
          flutter build hap --release

      - name: Find HAP file
        id: find_hap
        run: |
          HAP_FILE=$(find build -name "*.hap" -type f | head -1)
          if [ -z "$HAP_FILE" ]; then
            echo "::error::未找到 HAP 文件"
            exit 1
          fi
          echo "hap_path=$HAP_FILE" >> $GITHUB_OUTPUT
          echo "📦 Found: $HAP_FILE"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fu-sheng-music-ohos-${{ github.sha }}
          path: ${{ steps.find_hap.outputs.hap_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_hap.outputs.hap_path }}
          generate_release_notes: true
