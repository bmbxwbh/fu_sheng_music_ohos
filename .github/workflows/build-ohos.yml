name: Build HarmonyOS HAP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HarmonyOS CLI tools
        run: npm install -g @ohos/hvigor-cli @ohos/ohpm-cli

      - name: Restore signing certificates
        env:
          HARMONY_RELEASE_P12_BASE64: ${{ secrets.HARMONY_RELEASE_P12_BASE64 }}
          HARMONY_RELEASE_CER_BASE64: ${{ secrets.HARMONY_RELEASE_CER_BASE64 }}
          HARMONY_RELEASE_P7B_BASE64: ${{ secrets.HARMONY_RELEASE_P7B_BASE64 }}
        run: |
          mkdir -p signing
          echo "$HARMONY_RELEASE_P12_BASE64" | base64 -d > signing/release.p12
          echo "$HARMONY_RELEASE_CER_BASE64" | base64 -d > signing/release.cer
          echo "$HARMONY_RELEASE_P7B_BASE64" | base64 -d > signing/release.p7b

      - name: Install dependencies
        run: ohpm install

      - name: Build unsigned HAP
        run: |
          hvigor clean
          hvigor assembleRelease -Psigned=false

      - name: Sign HAP
        env:
          KEY_ALIAS: ${{ secrets.HARMONY_KEY_ALIAS }}
          STORE_PWD: ${{ secrets.HARMONY_STORE_PWD }}
          KEY_PWD: ${{ secrets.HARMONY_KEY_PWD }}
        run: |
          java -jar hapsigntoolv2.jar sign \
            -mode localjks \
            -privatekey "$KEY_ALIAS" \
            -inputFile entry/build/default/outputs/default/entry-default-unsigned.hap \
            -outputFile entry/build/default/outputs/default/entry-signed.hap \
            -signAlg SHA256withECDSA \
            -keystore signing/release.p12 \
            -keystorepasswd "$STORE_PWD" \
            -keyaliaspasswd "$KEY_PWD" \
            -profile signing/release.p7b \
            -certpath signing/release.cer \
            -profileSigned 1

      - name: Upload signed HAP
        uses: actions/upload-artifact@v4
        with:
          name: fu-sheng-music-ohos-${{ github.sha }}
          path: entry/build/default/outputs/default/entry-signed.hap
          retention-days: 30

      - name: Upload unsigned HAP (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: fu-sheng-music-ohos-unsigned-${{ github.sha }}
          path: entry/build/default/outputs/default/entry-default-unsigned.hap
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: entry/build/default/outputs/default/entry-signed.hap
          generate_release_notes: true
