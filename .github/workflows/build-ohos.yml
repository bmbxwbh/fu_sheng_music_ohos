name: Build HarmonyOS HAP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (ohos)
        run: |
          git clone -b br_3.27.4-ohos-1.0.4 "https://gitcode.com/openharmony-tpc/flutter_flutter.git" "$HOME/flutter-ohos"
          echo "$HOME/flutter-ohos/bin" >> $GITHUB_PATH
          export PATH="$HOME/flutter-ohos/bin:$PATH"
          flutter config --enable-ohos
          flutter --version

      - name: Setup OpenHarmony SDK
        run: |
          echo "Downloading OpenHarmony SDK (2.5GB, may take a while)..."
          curl -fsSL --retry 3 "https://mirrors.huaweicloud.com/harmonyos/os/6.1-Release/ohos-sdk-windows_linux-public.tar.gz" -o /tmp/ohos-sdk.tar.gz
          mkdir -p $HOME/ohos-sdk
          tar xzf /tmp/ohos-sdk.tar.gz -C $HOME/ohos-sdk/
          rm /tmp/ohos-sdk.tar.gz
          # 自动检测 SDK 目录结构
          SDK_DIR=$(ls -d $HOME/ohos-sdk/*/ 2>/dev/null | head -1)
          if [ -n "$SDK_DIR" ]; then
            export HOS_SDK_HOME="${SDK_DIR%/}"
          else
            export HOS_SDK_HOME="$HOME/ohos-sdk"
          fi
          echo "HOS_SDK_HOME=$HOS_SDK_HOME" >> $GITHUB_ENV
          echo "DEVECO_SDK_HOME=$HOS_SDK_HOME" >> $GITHUB_ENV
          echo "SDK path: $HOS_SDK_HOME"
          ls "$HOS_SDK_HOME/"

      - name: Download signing tools
        run: |
          curl -fsSL "https://mirrors.huaweicloud.com/harmonyos/develop_tools/hapsigntoolv2.jar" -o hapsigntoolv2.jar
          curl -fsSL "https://mirrors.huaweicloud.com/harmonyos/develop_tools/hmos_app_packing_tool.jar" -o hmos_app_packing_tool.jar
          echo "✅ 签名工具下载完成"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/
            ~/.pub-cache/
          key: ${{ runner.os }}-ohos-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-ohos-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build HAP (release)
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build hap --release

      - name: Build HAP (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: flutter build hap --release

      - name: Find HAP file
        id: find_hap
        run: |
          HAP_FILE=$(find build -name "*.hap" -type f | head -1)
          if [ -z "$HAP_FILE" ]; then
            echo "::error::未找到 HAP 文件"
            exit 1
          fi
          echo "hap_path=$HAP_FILE" >> $GITHUB_OUTPUT
          echo "📦 Found: $HAP_FILE"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fu-sheng-music-ohos-${{ github.sha }}
          path: ${{ steps.find_hap.outputs.hap_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_hap.outputs.hap_path }}
          generate_release_notes: true
