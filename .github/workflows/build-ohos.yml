name: Build HarmonyOS HAP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (ohos)
        run: |
          git clone -b br_3.27.4-ohos-1.0.4 "https://gitcode.com/openharmony-tpc/flutter_flutter.git" "$HOME/flutter-ohos"
          echo "$HOME/flutter-ohos/bin" >> $GITHUB_PATH
          export PATH="$HOME/flutter-ohos/bin:$PATH"
          flutter config --enable-ohos
          flutter --version

      - name: Setup OpenHarmony SDK
        run: |
          echo "Downloading OpenHarmony SDK (2.5GB)..."
          curl -fsSL --retry 3 "https://mirrors.huaweicloud.com/harmonyos/os/6.1-Release/ohos-sdk-windows_linux-public.tar.gz" -o /tmp/ohos-sdk.tar.gz
          mkdir -p $HOME/ohos-sdk
          tar xzf /tmp/ohos-sdk.tar.gz -C $HOME/ohos-sdk/
          rm /tmp/ohos-sdk.tar.gz
          cd $HOME/ohos-sdk/linux
          for z in *.zip; do unzip -qo "$z" -d . 2>/dev/null || true; done
          rm -f *.zip
          cd $GITHUB_WORKSPACE
          # 查找 hdc
          HDC_PATH=$(find $HOME/ohos-sdk -name "hdc" -type f 2>/dev/null | head -1)
          echo "hdc: $HDC_PATH"
          # hdc 在 toolchains/hdc，toolchains 的父目录是 linux
          # Flutter 要求 sdkPath/12/toolchains/hdc 结构
          # 所以在 linux/ 下创建 12/toolchains/ 并把 toolchains 内容复制进去
          TOOLCHAINS_SRC=$(dirname "$HDC_PATH")
          echo "toolchains src: $TOOLCHAINS_SRC"
          mkdir -p $HOME/ohos-sdk/linux/12/toolchains
          cp -r "$TOOLCHAINS_SRC"/* $HOME/ohos-sdk/linux/12/toolchains/
          echo "=== 最终结构 ==="
          ls -la $HOME/ohos-sdk/linux/12/toolchains/ | head -10
          echo "=== hdc 验证 ==="
          ls -la $HOME/ohos-sdk/linux/12/toolchains/hdc
          export OHOS_HOME="$HOME/ohos-sdk/linux"
          echo "OHOS_HOME=$OHOS_HOME" >> $GITHUB_ENV
          echo "OHOS_SDK_HOME=$OHOS_HOME" >> $GITHUB_ENV

      - name: Download signing tools
        run: |
          curl -fsSL "https://mirrors.huaweicloud.com/harmonyos/develop_tools/hapsigntoolv2.jar" -o hapsigntoolv2.jar
          curl -fsSL "https://mirrors.huaweicloud.com/harmonyos/develop_tools/hmos_app_packing_tool.jar" -o hmos_app_packing_tool.jar
          echo "✅ 签名工具下载完成"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/
            ~/.pub-cache/
          key: ${{ runner.os }}-ohos-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-ohos-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build HAP
        run: |
          echo "=== SDK 检测调试 ==="
          echo "OHOS_HOME=$OHOS_HOME"
          echo "OHOS_SDK_HOME=$OHOS_SDK_HOME"
          ls -la "$OHOS_HOME/"
          echo "=== 检查 12 目录 ==="
          ls -laR "$OHOS_HOME/12/"
          echo "=== 开始构建 ==="
          flutter build hap --release -v 2>&1 | tee /tmp/build.log | tail -30
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== SDK 相关日志 ==="
            grep -i "sdk\|hmos\|ohos\|hdc\|locate" /tmp/build.log | head -20
          fi

      - name: Find HAP file
        id: find_hap
        run: |
          HAP_FILE=$(find build -name "*.hap" -type f | head -1)
          if [ -z "$HAP_FILE" ]; then
            echo "::error::未找到 HAP 文件"
            exit 1
          fi
          echo "hap_path=$HAP_FILE" >> $GITHUB_OUTPUT
          echo "📦 Found: $HAP_FILE"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fu-sheng-music-ohos-${{ github.sha }}
          path: ${{ steps.find_hap.outputs.hap_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_hap.outputs.hap_path }}
          generate_release_notes: true
