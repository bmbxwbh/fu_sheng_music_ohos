name: Build HarmonyOS HAP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (ohos)
        run: |
          git clone --depth 1 -b 3.22.0-ohos "https://gitcode.com/openharmony-tpc/flutter_flutter.git" "$HOME/flutter-ohos"
          echo "$HOME/flutter-ohos/bin" >> $GITHUB_PATH
          export PATH="$HOME/flutter-ohos/bin:$PATH"
          flutter config --enable-ohos
          flutter --version

      - name: Setup HarmonyOS SDK
        env:
          HOS_SDK_URL: ${{ secrets.HOS_SDK_URL }}
        run: |
          if [ -z "$HOS_SDK_URL" ]; then
            echo "::warning::HOS_SDK_URL 未配置，将尝试使用 Flutter 内置工具链"
          else
            mkdir -p $HOME/huawei/sdk
            curl -fsSL "$HOS_SDK_URL" -o /tmp/hos-sdk.zip
            unzip -q /tmp/hos-sdk.zip -d $HOME/huawei/sdk/
            echo "DEVECO_SDK_HOME=$HOME/huawei/sdk" >> $GITHUB_ENV
          fi

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/
            .pub-cache/
            build/
          key: ${{ runner.os }}-ohos-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-ohos-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build HAP (debug)
        if: github.event_name == 'pull_request'
        run: flutter build hap --debug

      - name: Build HAP (release)
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build hap --release

      - name: Build HAP (profile)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: flutter build hap --profile

      - name: Find HAP file
        id: find_hap
        run: |
          HAP_FILE=$(find build -name "*.hap" -type f | head -1)
          if [ -z "$HAP_FILE" ]; then
            echo "::error::未找到 HAP 文件"
            exit 1
          fi
          echo "hap_path=$HAP_FILE" >> $GITHUB_OUTPUT
          echo "📦 Found: $HAP_FILE"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fu-sheng-music-ohos-${{ github.sha }}
          path: ${{ steps.find_hap.outputs.hap_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_hap.outputs.hap_path }}
          generate_release_notes: true
